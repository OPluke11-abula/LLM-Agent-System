name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements*.txt
      - name: Install runtime and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-providers.txt pytest pytest-cov pip-audit pytest-asyncio
      - name: Verify dependency consistency
        run: python -m pip check
      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
      - name: Run Python tests with coverage gate
        run: python -m pytest -q

  viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install locked JavaScript dependencies
        working-directory: viewer
        run: npm ci --ignore-scripts
      - name: Audit JavaScript dependencies
        working-directory: viewer
        run: npm audit --omit=dev --audit-level=high
      - name: Build viewer
        working-directory: viewer
        run: npm run build
      - name: Validate locked Rust metadata
        working-directory: viewer/src-tauri
        run: cargo metadata --locked --no-deps --format-version=1 > cargo-metadata.json
      - name: Generate JavaScript SBOM
        working-directory: viewer
        run: npm sbom --omit=dev --sbom-format=cyclonedx > npm-sbom.json

  mission-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install Python runtime
        run: python -m pip install -r requirements.txt -r requirements-providers.txt
      - name: Install locked JavaScript dependencies
        working-directory: viewer
        run: npm ci --ignore-scripts
      - name: Install Playwright Chromium
        working-directory: viewer
        run: npx playwright install --with-deps chromium
      - name: Build viewer
        working-directory: viewer
        run: npm run build
      - name: Run authenticated Mission E2E
        working-directory: viewer
        run: npm run test:e2e:missions
