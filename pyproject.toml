[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --cov=agent_workspace --cov-report=term-missing"
testpaths = [
    "agent_workspace/tests",
]
asyncio_mode = "strict"

[tool.coverage.run]
source = ["agent_workspace"]
omit = [
    "*/tests/*",
    "agent_workspace/tests/*",
    "agent_workspace/cli.py",
    "agent_workspace/service.py",
    "agent_workspace/run.py",
    "agent_workspace/topology_stream.py",
    "agent_workspace/topology_bridge.py",
]

[tool.coverage.report]
fail_under = 75
